<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbahi Gold - Vibrant Edition</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { 
            /* خلفية زاهية بتدرج لوني ديناميكي ومرن */
            background: linear-gradient(135deg, #1e0b36 0%, #0c1033 50%, #051c2c 100%); 
            color: #ffffff; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            height: 100vh; 
            margin: 0; 
            padding: 20px 20px 80px 20px; 
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;
        }
        
        /* تأثير الزجاج الشفاف للمرونة والجمال (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            box-sizing: border-box;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 15px;
            margin-bottom: 10px;
        }
        .username { color: #f9d976; font-weight: bold; font-size: 15px; }
        #ton-connect-btn { scale: 0.85; transform-origin: right; }
        
        .page { display: none; flex-direction: column; justify-content: flex-start; height: 100%; width: 100%; overflow-y: auto; }
        .page.active { display: flex; }

        .balance-box { margin-top: 15px; }
        #balance { 
            font-size: 42px; 
            font-weight: 900; 
            color: #ffffff; 
            margin-top: 5px; 
            text-shadow: 0 4px 20px rgba(249, 217, 118, 0.4);
            letter-spacing: 1px;
        }
        
        .coin-container { display: flex; justify-content: center; align-items: center; margin: 25px 0; position: relative; }
        
        /* تصميم زر التعدين ليكون ثلاثي الأبعاد وزاهي الإضاءة */
        .coin { 
            width: 180px; 
            height: 180px; 
            background: radial-gradient(circle, #ffe066 0%, #f5b041 60%, #cf850c 100%); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 26px; 
            color: #fff; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            border: 6px solid rgba(255, 255, 255, 0.9); 
            box-shadow: 0 0 40px rgba(245, 176, 65, 0.7), inset 0 -8px 15px rgba(0,0,0,0.2); 
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.2s;
            position: relative;
            z-index: 2;
        }
        .coin:active { transform: scale(0.90); box-shadow: 0 0 20px rgba(245, 176, 65, 0.5); }
        
        .energy-box { width: 100%; background: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 12px; margin-top: 10px; overflow: hidden; }
        .energy-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #ffdb4d 0%, #f39c12 100%); transition: width 0.1s ease; }
        
        /* زر الحصاد الأساسي بلون زاهٍ وتفاعلي ممتع */
        .claim-btn { 
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); 
            color: #fff; 
            border: none; 
            padding: 15px; 
            border-radius: 14px; 
            font-weight: bold; 
            font-size: 16px; 
            width: 100%; 
            cursor: pointer; 
            box-shadow: 0 4px 20px rgba(79, 172, 254, 0.4); 
            margin-top: 15px;
            transition: 0.2s;
        }
        .claim-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* أسلوب المهام المرن */
        .tasks-container { margin-top: 15px; text-align: right; width: 100%; }
        .task-card {
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .task-info h4 { margin: 0 0 5px 0; color: #fff; font-size: 15px; }
        .task-info p { margin: 0; color: #00f2fe; font-size: 13px; font-weight: bold; }
        .task-btn { 
            background: linear-gradient(135deg, #ffe066 0%, #f5b041 100%); 
            color: #000; 
            border: none; 
            padding: 8px 20px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 13px; 
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(245, 176, 65, 0.3);
        }
        .task-btn.done { background: rgba(255,255,255,0.1); color: #666; box-shadow: none; cursor: default; border: 1px solid rgba(255,255,255,0.05); }

        /* أسلوب الإدخال والقوائم */
        .input-box {
            width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 12px; border-radius: 10px; text-align: center; font-size: 13px; margin-bottom: 12px; box-sizing: border-box;
        }

        /* شريط التنقل السفلي الاحترافي */
        .nav-bar { 
            position: fixed; 
            bottom: 12px; 
            left: 15px; 
            right: 15px; 
            background: rgba(12, 16, 51, 0.75); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            display: flex; 
            justify-content: space-around; 
            padding: 10px 0; 
            z-index: 100; 
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
