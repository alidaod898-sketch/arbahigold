<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbahi Gold - Web3 Edition</title>
    <!-- استدعاء مكتبة ربط المحفظة الرسمية من تليجرام -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        /* التنسيقات السابقة مع إضافة لمسات الويب 3 */
        body { 
            background: radial-gradient(circle, #121212 0%, #050505 100%); 
            color: #ffffff; text-align: center; font-family: sans-serif; 
            display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 20px 20px 80px 20px; box-sizing: border-box; overflow: hidden;
        }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        
        /* زر ربط المحفظة */
        #ton-connect-btn { scale: 0.8; transform-origin: right; }

        .page { display: none; flex-direction: column; height: 100%; width: 100%; overflow-y: auto; }
        .page.active { display: flex; }

        #balance { font-size: 35px; font-weight: bold; color: #fff; margin-top: 10px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        
        .coin-btn { 
            width: 160px; height: 160px; background: radial-gradient(circle, #f9d976 0%, #e9b646 70%); 
            border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 22px; color: #332400; border: 4px solid #fff; cursor: pointer; transition: 0.1s;
        }
        .coin-btn:active { transform: scale(0.95); }

        .withdraw-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid #d4af37; border-radius: 15px;
            padding: 20px; margin-top: 20px; text-align: right;
        }
        .input-box {
            width: 100%; background: #000; border: 1px solid #333; color: #d4af37;
            padding: 12px; border-radius: 8px; margin: 10px 0; box-sizing: border-box;
        }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { color: #888; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #d4af37; }
        .btn-action { background: #d4af37; color: #000; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div style="text-align: left;">
            <div class="username" style="color: #d4af37; font-weight: bold;">Arbahi Miner</div>
            <div id="status" style="font-size: 10px; color: #888;">Wallet: Not Connected</div>
        </div>
        <!-- مكان ظهور زر المحفظة التلقائي -->
        <div id="ton-connect-btn"></div>
    </div>

    <!-- صفحة التعدين -->
    <div id="page-mine" class="page active">
        <div id="balance">0.0000 GOLD</div>
        <div class="coin-btn" id="main-coin">MINE</div>
        <div style="font-size: 14px; color: #888;">Energy: <span id="energy">500</span>/500</div>
        <button class="btn-action" style="margin-top: 20px;" onclick="showPage('withdraw')">طلب سحب الأرباح 💳</button>
    </div>

    <!-- صفحة السحب (Withdraw) -->
    <div id="page-withdraw" class="page">
        <div class="withdraw-card">
            <h3>سحب العملات إلى محفظتك</h3>
            <p style="font-size: 12px; color: #aaa;">الحد الأدنى للسحب: 1000 GOLD</p>
            
            <label>المبلغ المراد سحبه:</label>
            <input type="number" id="withdraw-amount" class="input-box" placeholder="0.00">
            
            <label>عنوان المحفظة (TON Address):</label>
            <input type="text" id="wallet-addr" class="input-box" placeholder="Connect wallet first" readonly>
            
            <button class="btn-action" onclick="processWithdraw()">تأكيد عملية السحب</button>
        </div>
        <p style="font-size: 11px; color: #666; margin-top: 10px;">* تتم معالجة الطلبات خلال 24 ساعة بعد التأكد من صحة التعدين.</p>
    </div>

    <!-- صفحة المهام -->
    <div id="page-tasks" class="page">
        <h2 style="color: #d4af37;">المهام</h2>
        <p>نفذ المهام لزيادة رصيدك القابل للسحب.</p>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('mine')"><span>⛏️</span><span>تعدين</span></div>
        <div class="nav-item" onclick="showPage('tasks')"><span>📋</span><span>المهام</span></div>
        <div class="nav-item" onclick="showPage('withdraw')"><span>💰</span><span>السحب</span></div>
    </div>

    <script>
        // 1. إعداد ربط المحفظة
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://alidaod898-sketch.github.io/arbahigold/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        let balance = parseFloat(localStorage.getItem('arbahi_balance')) || 0;
        let energy = 500;

        // مراقبة حالة اتصال المحفظة
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                const addr = wallet.account.address;
                document.getElementById('wallet-addr').value = addr.substring(0,8) + "..." + addr.substring(addr.length-4);
                document.getElementById('status').innerText = "Wallet: Connected";
                document.getElementById('status').style.color = "#4CAF50";
            } else {
                document.getElementById('wallet-addr').value = "";
                document.getElementById('status').innerText = "Wallet: Not Connected";
            }
        });

        // 2. نظام التعدين والحفظ
        document.getElementById('main-coin').addEventListener('click', () => {
            if(energy > 0) {
                balance += 0.01;
                energy -= 1;
                updateUI();
                localStorage.setItem('arbahi_balance', balance);
            }
        });

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(4) + " GOLD";
            document.getElementById('energy').innerText = energy;
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
        }

        // 3. نظام السحب
        function processWithdraw() {
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            if (!tonConnectUI.connected) {
                alert("يرجى ربط المحفظة أولاً من الأعلى!");
                return;
            }
            if (amount < 1000) {
                alert("عذراً، الحد الأدنى للسحب هو 1000 GOLD");
                return;
            }
            if (amount > balance) {
                alert("رصيدك غير كافٍ!");
                return;
            }

            // هنا في التطبيق الحقيقي يتم إرسال الطلب لـ API
            alert("تم إرسال طلب السحب بنجاح! سيتم التحقق من العملية وتحويل العملات لمحفظتك.");
            balance -= amount;
            localStorage.setItem('arbahi_balance', balance);
            updateUI();
        }

        setInterval(() => { if(energy < 500) energy++; updateUI(); }, 3000);
        updateUI();
    </script>
</body>
</html>
