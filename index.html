<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbahi Gold Ultimate Edition</title>
    <style>
        body { 
            background: linear-gradient(135deg, #1e0b36 0%, #0c1033 50%, #051c2c 100%); 
            color: #ffffff; text-align: center; font-family: sans-serif; 
            margin: 0; padding: 20px 20px 100px 20px; box-sizing: border-box;
            -webkit-user-select: none; user-select: none;
        }
        .glass-panel { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; margin-bottom: 15px; }
        .withdrawable-box { background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.3); border-radius: 10px; padding: 6px 12px; font-size: 11px; color: #00f2fe; }
        
        .page { display: none; flex-direction: column; width: 100%; }
        .page.active { display: flex; }
        
        #balance { font-size: 38px; font-weight: 900; margin-top: 10px; text-shadow: 0 4px 15px rgba(245, 176, 65, 0.3); }
        
        /* تأثيرات العملة الذهبية المتحركة النبضية */
        .coin-container { display: flex; justify-content: center; align-items: center; margin: 25px 0; position: relative; }
        .coin { 
            width: 180px; height: 180px; 
            background: radial-gradient(circle, #ffe066 0%, #f5b041 70%, #cf850c 100%); 
            border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-weight: bold; border: 6px solid #fff; cursor: pointer;
            box-shadow: 0 0 30px rgba(245, 176, 65, 0.6), inset 0 -6px 10px rgba(0,0,0,0.2);
            transition: transform 0.05s;
            animation: pulseGlow 2s infinite ease-in-out;
        }
        .coin:active { transform: scale(0.92); }
        .coin-text { font-size: 14px; color: #fff; letter-spacing: 1px; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.6); margin-top: 5px; }
        .coin-emoji { font-size: 45px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3)); }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px rgba(245, 176, 65, 0.5); }
            50% { box-shadow: 0 0 35px rgba(245, 176, 65, 0.8); transform: scale(1.02); }
            100% { box-shadow: 0 0 20px rgba(245, 176, 65, 0.5); }
        }

        .energy-box { width: 100%; background: rgba(255,255,255,0.1); border-radius: 10px; height: 12px; margin-top: 10px; overflow: hidden; }
        .energy-bar { height: 100%; background: linear-gradient(90deg, #ffdb4d, #f39c12); transition: width 0.1s ease; }
        
        .claim-btn { background: linear-gradient(135deg, #00f2fe, #4facfe); color: #fff; border: none; padding: 15px; border-radius: 14px; width: 100%; margin-top: 15px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3); }
        .claim-btn:active { transform: scale(0.98); }

        /* ستايل شبكة المتجر الاحترافي (مصلح بالكامل) */
        .store-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-height: 53vh; overflow-y: auto; margin-top: 10px; padding-bottom: 20px; }
        .miner-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 15px 10px; position: relative; box-sizing: border-box; }
        .miner-card.active-miner { border-color: #f5b041; background: rgba(245, 176, 65, 0.05); }
        .lvl-tag { position: absolute; top: 8px; right: 8px; font-size: 9px; color: #ccc; }
        .store-btn { width: 100%; padding: 10px; border-radius: 10px; border: none; font-weight: bold; font-size: 12px; cursor: pointer; margin-top: 5px; }
        .buy { background: #f5b041; color: #000; }
        .active-btn { background: rgba(255,255,255,0.2); color: #fff; cursor: default; }
        
        /* شريط السفلي الخماسي */
        .nav-bar { position: fixed; bottom: 12px; left: 10px; right: 10px; background: rgba(12, 16, 51, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px 0; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); z-index: 9999; }
        .nav-item { color: #7f8c8d; font-size: 10px; display: flex; flex-direction: column; align-items: center; width: 20%; cursor: pointer; }
        .nav-item.active { color: #00f2fe; }
        .nav-icon { font-size: 18px; margin-bottom: 2px; }
        .input-box { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; text-align: center; box-sizing: border-box; }

        .floating-num { position: absolute; color: #ffe066; font-size: 24px; font-weight: bold; pointer-events: none; animation: floatUp 0.6s ease-out forwards; text-shadow: 0 2px 8px rgba(245, 176, 65, 0.6); z-index: 1000; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
