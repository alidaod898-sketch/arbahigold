<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Arbahi Miner</title>
</head>
<body>

<div class="container">
  <h1>Arbahi Miner</h1>
  <p>المستوى: <span id="level" style="color: #ff9800; font-weight: bold;">مبتدئ</span></p>
  <p>الرصيد: <span id="balance">0.0000</span> USDT</p>
  
  <button id="boostBtn">تعدين يدوي (+0.01)</button>
  <div id="floatText" style="color: #ff9800; font-weight: bold; height: 20px; margin: 10px;"></div>
  
  <br>
  <button id="upgradeBtn" style="background: #007bff;">شراء ترقية (1 USDT)</button>
</div>

<style>
  body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
  .container { max-width: 400px; margin: auto; }
  
  button { 
    padding: 15px 20px; font-size: 16px; cursor: pointer; background: #28a745; 
    color: white; border: none; border-radius: 8px; margin: 5px; 
    width: 80%; transition: 0.2s; 
  }
  
  button:active { transform: scale(0.95); background-color: #ff9800; }
  button:disabled { background-color: #555; cursor: not-allowed; }
  
  #balance { font-size: 24px; font-weight: bold; color: #00ff88; transition: all 0.2s ease; }
</style>

<script>
  let balance = parseFloat(localStorage.getItem('arbahiBalance')) || 0;
  let miningSpeed = 0.001; 

  const balanceDisplay = document.getElementById('balance');
  const levelDisplay = document.getElementById('level');
  const boostBtn = document.getElementById('boostBtn');
  const upgradeBtn = document.getElementById('upgradeBtn');
  const floatText = document.getElementById('floatText');

  function updateLevel() {
    if (balance < 5) levelDisplay.innerText = "مبتدئ";
    else if (balance < 20) levelDisplay.innerText = "خبير تعدين";
    else levelDisplay.innerText = "حوت العملات 🐳";
  }

  function saveBalance() { 
    localStorage.setItem('arbahiBalance', balance); 
    updateLevel(); 
  }

  function showFloatingText() {
    floatText.innerText = "+0.01 USDT";
    setTimeout(() => { floatText.innerText = ""; }, 500);
  }

  setInterval(() => {
    balance += miningSpeed;
    balanceDisplay.innerText = balance.toFixed(4);
    saveBalance();
  }, 1000);

  boostBtn.onclick = function() {
    balance += 0.01;
    balanceDisplay.innerText = balance.toFixed(4);
    saveBalance();
    showFloatingText();
  };

  upgradeBtn.onclick = function() {
    if (balance >= 1.0) {
      upgradeBtn.disabled = true;
      upgradeBtn.innerText = "جاري المعالجة...";
      setTimeout(() => {
        balance -= 1.0;
        miningSpeed += 0.002;
        balanceDisplay.innerText = balance.toFixed(4);
        saveBalance();
        upgradeBtn.disabled = false;
        upgradeBtn.innerText = "شراء ترقية (1 USDT)";
      }, 800); 
    } else {
      alert("عذراً، رصيدك غير كافٍ للترقية.");
    }
  };

  updateLevel();
</script>
</body>
</html>
