<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbahi Gold Full Edition</title>
    <style>
        body { 
            background: linear-gradient(135deg, #1e0b36 0%, #0c1033 50%, #051c2c 100%); 
            color: #ffffff; text-align: center; font-family: sans-serif; 
            margin: 0; padding: 20px 20px 100px 20px; box-sizing: border-box;
        }
        .glass-panel { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; margin-bottom: 15px; }
        .withdrawable-box { background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.3); border-radius: 10px; padding: 6px 12px; font-size: 11px; color: #00f2fe; }
        .page { display: none; flex-direction: column; width: 100%; }
        .page.active { display: flex; }
        #balance { font-size: 38px; font-weight: 900; margin-top: 10px; }
        .coin { width: 170px; height: 170px; background: radial-gradient(circle, #ffe066 0%, #f5b041 60%); border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 6px solid #fff; cursor: pointer; }
        .energy-box { width: 100%; background: rgba(255,255,255,0.1); border-radius: 10px; height: 12px; margin-top: 10px; overflow: hidden; }
        .energy-bar { height: 100%; background: linear-gradient(90deg, #ffdb4d, #f39c12); }
        .claim-btn { background: linear-gradient(135deg, #00f2fe, #4facfe); color: #fff; border: none; padding: 15px; border-radius: 14px; width: 100%; margin-top: 15px; font-weight: bold; }
        .store-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-height: 50vh; overflow-y: auto; margin-top: 10px; }
        .miner-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 15px 10px; position: relative; }
        .lvl-tag { position: absolute; top: 8px; right: 8px; font-size: 9px; color: #ccc; }
        .store-btn { width: 100%; padding: 8px; border-radius: 10px; border: none; font-weight: bold; font-size: 11px; }
        .buy { background: #f5b041; color: #000; }
        .nav-bar { position: fixed; bottom: 12px; left: 10px; right: 10px; background: rgba(12, 16, 51, 0.9); display: flex; justify-content: space-around; padding: 10px 0; border-radius: 24px; }
        .nav-item { color: #7f8c8d; font-size: 10px; display: flex; flex-direction: column; align-items: center; width: 20%; cursor: pointer; }
        .nav-item.active { color: #00f2fe; }
        .input-box { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header glass-panel">
        <div style="text-align: right;">
            <span style="color:#f5b041; font-weight:bold;">Arbahi Miner 🚀</span><br>
            <span style="font-size:10px; color:#aaa;">ID: #948375</span>
        </div>
        <div class="withdrawable-box">💰 الرصيد: <span id="withdrawable-balance">0.0000</span> GOLD</div>
    </div>

    <div id="page-mine" class="page active">
        <div id="balance">0.0000 <span style="font-size:18px; color:#f5b041;">GOLD</span></div>
        <div class="coin" id="coin-btn">MINE</div>
        <div class="glass-panel">
            <div style="display:flex; justify-content:space-between; font-size:13px;"><span>⚡ الطاقة</span><span id="energy-text">500/500</span></div>
            <div class="energy-box"><div class="energy-bar" id="energy-fill" style="width:100%;"></div></div>
            <p style="font-size:12px; color:#00f2fe;">السرعة: +<span id="speed-display">0.0012</span>/ث</p>
        </div>
        <button class="claim-btn" onclick="claimEarnings()">CLAIM GOLD</button>
    </div>

    <div id="page-store" class="page">
        <h3 style="color:#f5b041;">المتجر (100 ليفل)</h3>
        <div class="store-grid" id="store-grid"></div>
    </div>

    <div id="page-tasks" class="page">
        <h3 style="color:#f5b041;">المهام اليومية</h3>
        <div class="glass-panel" style="margin-bottom:10px;">
            <p>تابع قناتنا على تليجرام</p>
            <button class="claim-btn" style="padding:8px; font-size:12px;">انضم الآن (+50)</button>
        </div>
    </div>

    <div id="page-friends" class="page">
        <h3 style="color:#f5b041;">دعوة الأصدقاء</h3>
        <input type="text" class="input-box" value="https://t.me/ArbahiBot?start=9483" readonly>
        <p style="font-size:12px;">تحصل على 100 GOLD لكل صديق</p>
    </div>

    <div id="page-withdraw" class="page">
        <h3 style="color:#f5b041;">سحب الأرباح</h3>
        <input type="number" class="input-box" placeholder="المبلغ">
        <button class="claim-btn" onclick="alert('سيتم المراجعة!')">تأكيد السحب</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('mine')">⛏️<span>تعدين</span></div>
        <div class="nav-item" onclick="showPage('store')">⚡<span>المتجر</span></div>
        <div class="nav-item" onclick="showPage('tasks')">📋<span>المهام</span></div>
        <div class="nav-item" onclick="showPage('friends')">👥<span>الأصدقاء</span></div>
        <div class="nav-item" onclick="showPage('withdraw')">💰<span>السحب</span></div>
    </div>

    <script>
        const BINANCE_WALLET = "UQDHv9eGYkUfDz4N9QTpWESn86Yx_bZcM60kJ4dEDf6Fg8FO";
        let count = parseFloat(localStorage.getItem('bal')) || 0;
        let withBal = parseFloat(localStorage.getItem('wbal')) || 0;
        let level = parseInt(localStorage.getItem('lvl')) || 1;
        let speed = 0.0012 + (level * 0.0005);

        function renderStore() {
            const grid = document.getElementById('store-grid');
            grid.innerHTML = "";
            for (let i = 1; i <= 100; i++) {
                let cost = (0.01 * i).toFixed(2);
                const card = document.createElement('div');
                card.className = "miner-card";
                card.innerHTML = `
                    <span class="lvl-tag">Lvl ${i}</span>
                    <div style="font-size:25px;">🧠</div>
                    <div style="font-size:11px;">Matrix ${i}</div>
                    <button class="store-btn buy" onclick="buyLevel(${i}, ${cost})">${i <= level ? 'مفعل' : 'شحن ' + cost}</button>
                `;
                grid.appendChild(card);
            }
        }

        function buyLevel(lvl, cost) {
            if (lvl <= level) return;
            window.location.href = `ton://transfer/${BINANCE_WALLET}?amount=${cost * 1000000000}`;
            // ملاحظة: الترقية الحقيقية يفضل أن تتم بعد التأكيد اليدوي، هنا هي للتجربة
            alert("يرجى إتمام الدفع في محفظتك ثم العودة");
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
        }

        setInterval(() => {
            count += speed;
            document.getElementById('balance').innerText = count.toFixed(4);
            localStorage.setItem('bal', count);
        }, 1000);

        function claimEarnings() { withBal += count; count = 0; document.getElementById('withdrawable-balance').innerText = withBal.toFixed(4); localStorage.setItem('wbal', withBal); }

        renderStore();
    </script>
</body>
</html>
