<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbahi Gold - Binance Connected</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        /* التنسيقات المتوافقة مع صورة المستخدم في ملف Screenshot_٢٠٢٦-٠٦-٠٢-٠٠-٥٨-٤٦-٤٥٣_org.telegram.messenger.jpg */
        body { 
            background: #0a0a0a; color: #fff; text-align: center; font-family: sans-serif; 
            margin: 0; padding: 20px 20px 100px 20px; box-sizing: border-box;
        }
        .header { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .store-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; overflow-y: auto; max-height: 70vh; }
        .miner-card { background: #151515; border: 1px solid #333; border-radius: 15px; padding: 15px; position: relative; }
        .miner-card.active-plan { border-color: #f5b041; background: #1e1a10; }
        .lvl-tag { position: absolute; top: 10px; right: 10px; font-size: 10px; color: #888; border: 1px solid #333; padding: 2px 5px; border-radius: 5px; }
        .miner-icon { font-size: 40px; margin-bottom: 10px; }
        .miner-name { font-size: 14px; font-weight: bold; }
        .miner-speed { color: #00f2fe; font-size: 12px; margin: 5px 0 15px 0; }
        .buy-btn { background: #f5b041; color: #000; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .buy-btn.disabled { background: #333; color: #666; cursor: not-allowed; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <div style="text-align: left;">
            <div style="color: #f5b041; font-weight: bold;">Arbahi Miner</div>
            <div id="wallet-status" style="font-size: 10px; color: #888;">لم يتم الربط</div>
        </div>
        <div id="ton-connect-btn"></div>
    </div>

    <h2 style="font-size: 18px;">AI Matrix Plans (100 Levels)</h2>
    
    <div class="store-grid" id="store-container">
        <!-- سيتم توليد الـ 100 مستوى هنا تلقائياً -->
    </div>

    <div class="nav-bar">
        <div>⛏️<br><small>Mine</small></div>
        <div style="color: #f5b041;">⚡<br><small>Store</small></div>
        <div>📋<br><small>Tasks</small></div>
        <div>👥<br><small>Friends</small></div>
    </div>

    <script>
        // عنوان محفظتك في Binance الذي زودتني به
        const BINANCE_WALLET = "UQDHv9eGYkUfDz4N9QTpWESn86Yx_bZcM60kJ4dEDf6Fg8FO";

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://alidaod898-sketch.github.io/arbahigold/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        let userLevel = parseInt(localStorage.getItem('user_lvl')) || 1;

        // دالة توليد المستويات بأسعار تنافسية (تبدأ من 0.01 TON)
        function renderStore() {
            const container = document.getElementById('store-container');
            container.innerHTML = "";

            for (let i = 1; i <= 100; i++) {
                // معادلة السعر التنافسي: زيادة طفيفة جداً لجذب المستخدمين
                let price = (0.01 + (i - 1) * 0.05).toFixed(2);
                let speed = (1.2 + (i * 0.5)).toFixed(1);
                
                const card = document.createElement('div');
                card.className = `miner-card ${i === userLevel ? 'active-plan' : ''}`;
                
                let btnText = i <= userLevel ? "مفعل ✅" : `فتح بـ ${price} TON`;
                let btnClass = i === userLevel + 1 ? "buy-btn" : "buy-btn disabled";
                let btnAction = i === userLevel + 1 ? `onclick="payForLevel(${i}, ${price})"` : "";

                card.innerHTML = `
                    <div class="lvl-tag">LVL ${i}</div>
                    <div class="miner-icon">🧠</div>
                    <div class="miner-name">AI Matrix ${i}</div>
                    <div class="miner-speed">${speed} TH/s</div>
                    <button class="${btnClass}" ${btnAction}>${btnText}</button>
                `;
                container.appendChild(card);
            }
        }

        async function payForLevel(lvl, amount) {
            if (!tonConnectUI.connected) {
                alert("يرجى ربط المحفظة أولاً!");
                return;
            }

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{
                    address: BINANCE_WALLET,
                    amount: (amount * 1000000000).toString() // تحويل إلى NanoTON
                }]
            };

            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                if (result) {
                    userLevel = lvl;
                    localStorage.setItem('user_lvl', userLevel);
                    alert(`مبروك! تم فتح المستوى ${lvl} بنجاح.`);
                    renderStore();
                }
            } catch (e) {
                alert("فشلت العملية أو تم إلغاؤها.");
            }
        }

        renderStore();
        
        tonConnectUI.onStatusChange(wallet => {
            document.getElementById('wallet-status').innerText = wallet ? "متصلة" : "غير متصلة";
        });
    </script>
</body>
</html>
