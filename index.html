<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbahi Mining Bot - Premium Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: linear-gradient(135deg, #1e0b36 0%, #0c1033 50%, #051c2c 100%); color: #ffffff; text-align: center; font-family: sans-serif; margin: 0; padding: 20px 20px 100px 20px; box-sizing: border-box; -webkit-user-select: none; user-select: none; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px; margin-bottom: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        .withdrawable-box { background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.3); border-radius: 10px; padding: 6px 12px; font-size: 11px; color: #00f2fe; }
        .page { display: none; flex-direction: column; width: 100%; }
        .page.active { display: flex; }
        #balance { font-size: 38px; font-weight: 900; margin-top: 10px; text-shadow: 0 4px 15px rgba(245, 176, 65, 0.3); }
        .coin-container { display: flex; justify-content: center; align-items: center; margin: 25px 0; position: relative; height: 200px; }
        .coin { width: 180px; height: 180px; background: radial-gradient(circle, #ffe066 0%, #f5b041 70%, #cf850c 100%); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; border: 6px solid #fff; cursor: pointer; box-shadow: 0 0 30px rgba(245, 176, 65, 0.6), inset 0 -6px 10px rgba(0,0,0,0.2); transition: transform 0.05s; animation: pulseGlow 2s infinite ease-in-out; z-index: 5; }
        .coin:active { transform: scale(0.92); }
        .coin-text { font-size: 14px; color: #fff; letter-spacing: 1px; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.6); margin-top: 5px; }
        .coin-emoji { font-size: 45px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3)); }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 20px rgba(245, 176, 65, 0.5); transform: scale(1); } 50% { box-shadow: 0 0 35px rgba(245, 176, 65, 0.8); transform: scale(1.02); } 100% { box-shadow: 0 0 20px rgba(245, 176, 65, 0.5); transform: scale(1); } }
        .energy-box { width: 100%; background: rgba(255,255,255,0.1); border-radius: 10px; height: 12px; margin-top: 10px; overflow: hidden; }
        .energy-bar { height: 100%; background: linear-gradient(90deg, #ffdb4d, #f39c12); width: 100%; transition: width 0.1s ease; }
        .claim-btn { background: linear-gradient(135deg, #00f2fe, #4facfe); color: #fff; border: none; padding: 15px; border-radius: 14px; width: 100%; margin-top: 15px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3); }
        .store-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; }
        .miner-card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px; }
        .nav-bar { position: fixed; bottom: 12px; left: 10px; right: 10px; background: rgba(12, 16, 51, 0.96); backdrop-filter: blur(12px); display: flex; justify-content: space-around; padding: 12px 0; border-radius: 24px; z-index: 99999; }
        .nav-item { color: #7f8c8d; font-size: 11px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: #00f2fe; }
        .input-box { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div style="text-align: right;"><span style="color:#f5b041; font-weight:bold; font-size: 15px;">Arbahi Miner 🚀</span></div>
        <div class="withdrawable-box">GOLD الرصيد المتاح: <span id="withdrawable-balance">0.0000</span></div>
    </div>

    <div id="page-mine" class="page active">
        <div id="balance">0.0000 <span style="font-size:18px; color:#f5b041;">GOLD</span></div>
        <div class="coin-container" id="coin-area"><div class="coin" id="coin-btn"><span class="coin-emoji">🪙</span><span class="coin-text">TAP</span></div></div>
        <div class="glass-panel"><div class="energy-box"><div class="energy-bar" id="energy-fill"></div></div></div>
        <button class="claim-btn" onclick="claimEarnings()">CLAIM GOLD</button>
    </div>
    <div id="page-store" class="page"><h3>المتجر</h3><div class="store-grid" id="store-grid"></div></div>
    <div id="page-tasks" class="page"><h3>المهام</h3><p>لا توجد مهام حالياً</p></div>
    <div id="page-friends" class="page"><h3>الأصدقاء</h3></div>
    <div id="page-withdraw" class="page"><h3>السحب</h3></div>
    <div id="page-admin" class="page">
        <h3 style="color:#ff4d4d;">👑 لوحة تحكم المالك</h3>
        <div class="glass-panel">
            <input type="number" id="admin-speed" class="input-box" placeholder="سرعة التعدين الجديدة">
            <button class="claim-btn" onclick="updateGlobalSpeed()">تحديث السرعة</button>
            <hr>
            <input type="text" id="target-id" class="input-box" placeholder="ID المستخدم">
            <button class="claim-btn" onclick="adminAction('reset')">تصفير رصيد المستخدم</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-mine" onclick="showPage('mine')">⛏️<span>تعدين</span></div>
        <div class="nav-item" id="nav-store" onclick="showPage('store')">⚡<span>المتجر</span></div>
        <div class="nav-item" id="nav-tasks" onclick="showPage('tasks')">📋<span>المهام</span></div>
        <div class="nav-item" id="nav-withdraw" onclick="showPage('withdraw')">💰<span>السحب</span></div>
        <div class="nav-item" id="nav-admin" style="display:none; color:#ff4d4d;" onclick="showPage('admin')">⚙️<span>Admin</span></div>
    </div>

    <script>
        const ADMIN_ID = 8700285835;
        let count = 0, withBal = 0, speed = 0.0012, energy = 500;
        
        window.onload = function() {
            if (window.Telegram.WebApp.initDataUnsafe?.user?.id === ADMIN_ID) {
                document.getElementById('nav-admin').style.display = 'flex';
            }
            updateDisplay();
        };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        }

        function updateDisplay() {
            document.getElementById('balance').innerHTML = count.toFixed(4) + ' <span style="font-size:18px; color:#f5b041;">GOLD</span>';
            document.getElementById('withdrawable-balance').innerText = withBal.toFixed(4);
        }

        function updateGlobalSpeed() { speed = parseFloat(document.getElementById('admin-speed').value); alert('تم التحديث: ' + speed); }
        function adminAction(act) { alert('تم تنفيذ: ' + act + ' للمستخدم: ' + document.getElementById('target-id').value); }
        function claimEarnings() { withBal += count; count = 0; updateDisplay(); }

        document.getElementById('coin-btn').onclick = () => { count += 0.01; updateDisplay(); };
        setInterval(() => { count += speed; updateDisplay(); }, 1000);
    </script>
</body>
</html>
