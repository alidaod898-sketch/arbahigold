<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbahi Miner Fix</title>
    <style>
        body { background: linear-gradient(135deg, #1e0b36 0%, #0c1033 50%, #051c2c 100%); color: #ffffff; text-align: center; font-family: sans-serif; margin: 0; padding: 20px 20px 100px 20px; box-sizing: border-box; -webkit-user-select: none; user-select: none; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px; margin-bottom: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        .withdrawable-box { background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.3); border-radius: 10px; padding: 6px 12px; font-size: 11px; color: #00f2fe; }
        .page { display: none; flex-direction: column; width: 100%; }
        .page.active { display: flex; }
        
        /* إصلاح جذري لعرض كروت المتجر لمنع التداخل */
        .store-grid { display: block; width: 100%; max-height: 55vh; overflow-y: auto; margin-top: 10px; padding-bottom: 20px; }
        .miner-card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px; margin-bottom: 15px; width: 92%; margin-left: auto; margin-right: auto; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0c1033; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 9999; }
        .nav-item { color: #7f8c8d; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #00f2fe; }
        
        .coin-container { display: flex; justify-content: center; margin: 25px 0; }
        .coin { width: 150px; height: 150px; background: #f5b041; border-radius: 50%; border: 5px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .claim-btn { background: #00f2fe; color: #000; border: none; padding: 15px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div style="text-align: right;">Arbahi Miner 🚀</div>
        <div class="withdrawable-box" id="withdrawable-balance">0.0000</div>
    </div>

    <div id="page-mine" class="page active">
        <div id="balance" style="font-size:30px;">0.0000 GOLD</div>
        <div class="coin-container"><div class="coin" id="coin-btn">🪙</div></div>
        <button class="claim-btn" onclick="claimEarnings()">CLAIM GOLD</button>
    </div>

    <div id="page-store" class="page">
        <h3>المتجر الذكي</h3>
        <div class="store-grid" id="store-grid"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-mine" onclick="showPage('mine')">⛏️ تعدين</div>
        <div class="nav-item" id="nav-store" onclick="showPage('store')">⚡ متجر</div>
        <div class="nav-item" onclick="showPage('withdraw')" onclick="showPage('withdraw')">💰 سحب</div>
    </div>

    <script>
        let count = parseFloat(localStorage.getItem('bal')) || 0;
        let level = parseInt(localStorage.getItem('lvl')) || 1;

        function renderStore() {
            const grid = document.getElementById('store-grid');
            grid.innerHTML = "";
            for (let i = 1; i <= 20; i++) {
                const card = document.createElement('div');
                card.className = "miner-card";
                card.innerHTML = `<div>Level ${i}</div><button onclick="buy(${i})">${i <= level ? 'مفعل' : 'شراء'}</button>`;
                grid.appendChild(card);
            }
        }

        function buy(l) { level = l; localStorage.setItem('lvl', l); renderStore(); }
        document.getElementById('coin-btn').onclick = () => { count += 0.01; update(); };
        function update() { document.getElementById('balance').innerText = count.toFixed(4) + " GOLD"; }
        
        function showPage(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
        }
        renderStore();
    </script>
</body>
</html>
